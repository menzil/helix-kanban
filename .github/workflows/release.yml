name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: read

jobs:
  verify-version:
    name: Verify tag version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Match tag to Cargo package version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(cargo metadata --locked --no-deps --format-version 1 | jq -er '.packages[] | select(.name == "helix-kanban") | .version')"

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Release tag version '$tag_version' does not match Cargo.toml package version '$package_version'." >&2
            exit 1
          fi

  create-release:
    name: Create GitHub Release
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release from changelog
        uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md

  upload-assets:
    name: Build ${{ matrix.target }}
    needs:
      - verify-version
      - create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
            build-tool: cargo
            executable-suffix: ''
            test-binary: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            build-tool: cargo
            executable-suffix: ''
            test-binary: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            build-tool: cross
            executable-suffix: ''
            test-binary: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            build-tool: cross
            executable-suffix: ''
            test-binary: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            build-tool: cargo
            executable-suffix: .exe
            test-binary: true

    steps:
      - uses: actions/checkout@v4

      - name: Build and upload archive
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: hxk
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build-tool }}
          locked: true
          archive: $bin-$tag-$target
          tar: unix
          zip: windows
          checksum: sha256
          include: readme.md,LICENSE-MIT,LICENSE-APACHE

      - name: Verify binary version
        if: matrix.test-binary
        shell: bash
        run: |
          version_output="$("target/${{ matrix.target }}/release/hxk${{ matrix.executable-suffix }}" --version)"
          if [[ "$version_output" != *"${GITHUB_REF_NAME#v}"* ]]; then
            echo "Expected hxk --version to contain '${GITHUB_REF_NAME#v}', got '$version_output'." >&2
            exit 1
          fi
